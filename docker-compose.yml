services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_compare_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_compare_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: bash -lc "rm -f tmp/pids/server.pid && ruby bin/rails server -b 0.0.0.0"
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: job_compare_development
      FRONTEND_ORIGIN: http://localhost:5173
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -lc "if [ ! -x node_modules/.bin/vite ]; then npm ci; fi; npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_DEMO_EMAIL: ${VITE_DEMO_EMAIL:-demo@example.com}
      VITE_DEMO_PASSWORD: ${VITE_DEMO_PASSWORD:-password}
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - web

  e2e_web:
    build: .
    command: bash -lc "rm -f tmp/pids/server.pid && ruby bin/rails server -b 0.0.0.0"
    environment:
      RAILS_ENV: test
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: job_compare_test
      FRONTEND_ORIGIN: http://localhost:3100
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "3100:3000"
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /app
    environment:
      PLAYWRIGHT_SKIP_DOCKER: "1"
      PLAYWRIGHT_BASE_URL: http://e2e_web:3000
      VITE_API_BASE_URL: http://e2e_web:3000
      VITE_DEMO_EMAIL: ${VITE_DEMO_EMAIL:-demo@example.com}
      VITE_DEMO_PASSWORD: ${VITE_DEMO_PASSWORD:-password}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - e2e_web

volumes:
  postgres_data:
  bundle_data:
  node_modules:
