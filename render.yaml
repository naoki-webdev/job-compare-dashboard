services:
  - type: web
    name: job-compare-dashboard
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_USER_EMAIL
        sync: false
      - key: ADMIN_USER_PASSWORD
        sync: false
      - key: ADMIN_USER_NAME
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
